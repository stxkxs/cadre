<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 680" width="1040" height="680">
  <style>
    text { font-family: 'Geist', system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
    .section { font-size: 10px; fill: #52525A; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
    .label { font-size: 11px; fill: #EDEDEF; font-weight: 500; }
    .dim { font-size: 10px; fill: #52525A; }
    .sm { font-size: 9px; fill: #52525A; }
    .box { fill: #111113; stroke: rgba(255,255,255,0.06); stroke-width: 1; rx: 6; }
    .group { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 1; rx: 8; stroke-dasharray: 4 4; }
    .conn { fill: none; stroke: rgba(255,255,255,0.10); stroke-width: 1; marker-end: url(#tip); }
    .conn-a { fill: none; stroke: #6E7CF1; stroke-width: 1; opacity: 0.3; marker-end: url(#tip-a); }
  </style>
  <defs>
    <marker id="tip" markerWidth="4" markerHeight="3" refX="4" refY="1.5" orient="auto">
      <path d="M0,0 L4,1.5 L0,3 Z" fill="rgba(255,255,255,0.15)" />
    </marker>
    <marker id="tip-a" markerWidth="4" markerHeight="3" refX="4" refY="1.5" orient="auto">
      <path d="M0,0 L4,1.5 L0,3 Z" fill="#6E7CF1" opacity="0.5" />
    </marker>
  </defs>

  <rect width="1040" height="680" fill="#0A0A0B" />

  <!-- ── Connectors (behind everything) ── -->
  <path d="M 520 140 L 520 180" class="conn" />              <!-- UI → Engine -->
  <path d="M 195 270 L 260 270" class="conn-a" />             <!-- Ingest → Engine -->
  <path d="M 710 270 L 760 270" class="conn" />               <!-- Engine → Providers -->
  <path d="M 400 348 L 400 440" class="conn" />               <!-- Engine → Data -->
  <path d="M 550 348 L 550 440" class="conn" />               <!-- Engine → BullMQ -->
  <path d="M 640 348 L 640 500 L 760 500" class="conn" />     <!-- Engine → Integrations -->

  <!-- ── Header ── -->
  <text x="520" y="28" text-anchor="middle" class="mono section" style="letter-spacing:0.12em">cadre</text>
  <text x="520" y="44" text-anchor="middle" class="dim">agent workflow orchestrator</text>

  <!-- ── UI ── -->
  <rect x="420" y="100" width="200" height="40" class="group" />
  <text x="432" y="114" class="section">ui</text>
  <text x="500" y="125" text-anchor="middle" class="label">Next.js</text>
  <text x="550" y="125" text-anchor="middle" class="dim">·</text>
  <text x="582" y="125" text-anchor="middle" class="label">React Flow</text>

  <!-- ── Ingest ── -->
  <rect x="40" y="195" width="155" height="150" class="group" />
  <text x="52" y="210" class="section">ingest</text>
  <text x="117" y="240" text-anchor="middle" class="label">External Systems</text>
  <text x="117" y="258" text-anchor="middle" class="dim">POST /api/ingest</text>
  <text x="117" y="274" text-anchor="middle" class="dim">cadre_ API keys</text>
  <text x="117" y="290" text-anchor="middle" class="dim">callback webhooks</text>
  <text x="117" y="306" text-anchor="middle" class="dim">webhook triggers</text>

  <!-- ── Engine ── -->
  <rect x="260" y="180" width="450" height="168" class="group" />
  <text x="272" y="196" class="section">engine</text>

  <rect x="280" y="210" width="130" height="32" class="box" />
  <text x="345" y="230" text-anchor="middle" class="label">Graph Builder</text>

  <rect x="425" y="210" width="130" height="32" class="box" />
  <text x="490" y="230" text-anchor="middle" class="label">Scheduler</text>

  <rect x="570" y="210" width="120" height="32" class="box" />
  <text x="630" y="230" text-anchor="middle" class="label">Run Prepare</text>

  <rect x="280" y="258" width="400" height="32" class="box" />
  <text x="480" y="278" text-anchor="middle" class="label">Executor</text>

  <rect x="280" y="306" width="130" height="32" class="box" />
  <text x="345" y="326" text-anchor="middle" class="label">Context</text>

  <rect x="425" y="306" width="130" height="32" class="box" />
  <text x="490" y="322" text-anchor="middle" class="label">Sandbox</text>
  <text x="490" y="334" text-anchor="middle" class="dim">QuickJS</text>

  <rect x="570" y="306" width="120" height="32" class="box" />
  <text x="630" y="322" text-anchor="middle" class="label">Validation</text>
  <text x="630" y="334" text-anchor="middle" class="dim">Zod</text>

  <!-- ── Providers ── -->
  <rect x="760" y="195" width="150" height="192" class="group" />
  <text x="772" y="210" class="section">providers</text>

  <rect x="774" y="222" width="122" height="26" class="box" />
  <text x="835" y="239" text-anchor="middle" class="label">Anthropic</text>
  <rect x="774" y="254" width="122" height="26" class="box" />
  <text x="835" y="271" text-anchor="middle" class="label">OpenAI</text>
  <rect x="774" y="286" width="122" height="26" class="box" />
  <text x="835" y="303" text-anchor="middle" class="label">Groq</text>
  <rect x="774" y="318" width="122" height="26" class="box" />
  <text x="835" y="335" text-anchor="middle" class="label">Bedrock</text>
  <rect x="774" y="350" width="122" height="26" class="box" />
  <text x="835" y="367" text-anchor="middle" class="label">Claude Code</text>

  <!-- ── Data ── -->
  <rect x="300" y="440" width="150" height="86" class="group" />
  <text x="312" y="455" class="section">data</text>
  <rect x="312" y="462" width="126" height="24" class="box" />
  <text x="375" y="478" text-anchor="middle" class="label">PostgreSQL</text>
  <rect x="312" y="492" width="126" height="24" class="box" />
  <text x="375" y="508" text-anchor="middle" class="label">Redis</text>
  <text x="375" y="538" text-anchor="middle" class="dim">pgSchema('cadre')</text>
  <text x="375" y="552" text-anchor="middle" class="dim">shared: users, engagements</text>

  <!-- ── BullMQ ── -->
  <rect x="480" y="440" width="140" height="44" class="box" />
  <text x="550" y="458" text-anchor="middle" class="label" style="fill:#6E7CF1">BullMQ</text>
  <text x="550" y="474" text-anchor="middle" class="dim">Redis-backed queue</text>

  <!-- ── Integrations ── -->
  <rect x="760" y="440" width="230" height="140" class="group" />
  <text x="772" y="455" class="section">integrations</text>

  <rect x="774" y="464" width="66" height="22" class="box" />
  <text x="807" y="479" text-anchor="middle" class="sm">GitHub</text>
  <rect x="846" y="464" width="66" height="22" class="box" />
  <text x="879" y="479" text-anchor="middle" class="sm">Linear</text>
  <rect x="918" y="464" width="60" height="22" class="box" />
  <text x="948" y="479" text-anchor="middle" class="sm">Slack</text>

  <rect x="774" y="492" width="66" height="22" class="box" />
  <text x="807" y="507" text-anchor="middle" class="sm">Figma</text>
  <rect x="846" y="492" width="66" height="22" class="box" />
  <text x="879" y="507" text-anchor="middle" class="sm">Notion</text>
  <rect x="918" y="492" width="60" height="22" class="box" />
  <text x="948" y="507" text-anchor="middle" class="sm">Jira</text>

  <rect x="774" y="520" width="66" height="22" class="box" />
  <text x="807" y="535" text-anchor="middle" class="sm">Confluence</text>
  <rect x="846" y="520" width="66" height="22" class="box" />
  <text x="879" y="535" text-anchor="middle" class="sm">Loom</text>
  <rect x="918" y="520" width="60" height="22" class="box" />
  <text x="948" y="535" text-anchor="middle" class="sm">Coda</text>

  <rect x="774" y="548" width="66" height="22" class="box" />
  <text x="807" y="563" text-anchor="middle" class="sm">Google Docs</text>

  <!-- ── Auth ── -->
  <rect x="40" y="440" width="155" height="86" class="group" />
  <text x="52" y="455" class="section">auth</text>
  <rect x="52" y="462" width="131" height="24" class="box" />
  <text x="117" y="478" text-anchor="middle" class="label">Password Gate</text>
  <rect x="52" y="492" width="131" height="24" class="box" />
  <text x="117" y="508" text-anchor="middle" class="label">JWT Sessions</text>

  <!-- ── Deploy ── -->
  <rect x="480" y="510" width="140" height="82" class="group" />
  <text x="492" y="525" class="section">deploy</text>
  <rect x="492" y="532" width="116" height="24" class="box" />
  <text x="550" y="548" text-anchor="middle" class="label">Docker</text>
  <rect x="492" y="562" width="116" height="24" class="box" />
  <text x="550" y="578" text-anchor="middle" class="label">Helm / EKS</text>

</svg>

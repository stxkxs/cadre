version: "3"

vars:
  DOCKER_COMPOSE: docker compose

tasks:
  # ── Setup ──────────────────────────────────────────────────
  setup:
    desc: First-time project setup (install deps, copy env, start DB, migrate)
    cmds:
      - task: install
      - task: env
      - task: infra:up
      - sleep 3
      - task: db:migrate

  install:
    desc: Install pnpm dependencies
    sources:
      - package.json
      - pnpm-lock.yaml
    cmds:
      - pnpm install

  env:
    desc: Copy .env.example → .env.local (won't overwrite)
    status:
      - test -f .env.local
    cmds:
      - cp .env.example .env.local
      - echo "Created .env.local — fill in your secrets"

  # ── Development ────────────────────────────────────────────
  dev:
    desc: Start Next.js dev server
    deps: [install]
    cmds:
      - pnpm dev

  build:
    desc: Production build
    deps: [install]
    cmds:
      - pnpm build

  start:
    desc: Start production server (requires build first)
    cmds:
      - pnpm start

  lint:
    desc: Run ESLint
    cmds:
      - pnpm lint

  lint:fix:
    desc: Run ESLint with auto-fix
    cmds:
      - pnpm lint --fix

  # ── Testing ────────────────────────────────────────────────
  test:
    desc: Run tests once
    cmds:
      - pnpm test

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - pnpm test:watch

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - pnpm test:coverage

  # ── Database ───────────────────────────────────────────────
  db:generate:
    desc: Generate Drizzle migration files from schema changes
    cmds:
      - pnpm db:generate

  db:migrate:
    desc: Run pending database migrations
    cmds:
      - pnpm db:migrate

  db:push:
    desc: Push schema directly to database (dev only, no migration files)
    cmds:
      - pnpm db:push

  db:studio:
    desc: Open Drizzle Studio (database browser)
    cmds:
      - pnpm db:studio

  db:check:
    desc: Verify database connection
    cmds:
      - pnpm db:check

  db:reset:
    desc: Drop and recreate the database (destructive!)
    prompt: This will destroy all data. Continue?
    cmds:
      - "{{.DOCKER_COMPOSE}} exec db psql -U postgres -c 'DROP DATABASE IF EXISTS cadre;'"
      - "{{.DOCKER_COMPOSE}} exec db psql -U postgres -c 'CREATE DATABASE cadre;'"
      - task: db:migrate

  # ── Infrastructure ─────────────────────────────────────────
  infra:up:
    desc: Start Postgres + Redis containers
    cmds:
      - "{{.DOCKER_COMPOSE}} up -d"

  infra:down:
    desc: Stop infrastructure containers
    cmds:
      - "{{.DOCKER_COMPOSE}} down"

  infra:destroy:
    desc: Stop containers and delete volumes (destructive!)
    prompt: This will delete all database data. Continue?
    cmds:
      - "{{.DOCKER_COMPOSE}} down -v"

  infra:logs:
    desc: Tail infrastructure container logs
    cmds:
      - "{{.DOCKER_COMPOSE}} logs -f"

  infra:ps:
    desc: Show infrastructure container status
    cmds:
      - "{{.DOCKER_COMPOSE}} ps"

  # ── Docker (app) ───────────────────────────────────────────
  docker:build:
    desc: Build the Cadre Docker image
    cmds:
      - docker build -t cadre:latest .

  docker:run:
    desc: Run the Cadre Docker image locally
    cmds:
      - docker run --rm -p 3000:3000 --env-file .env.local --network host cadre:latest

  # ── Helm / k8s ─────────────────────────────────────────────
  helm:template:
    desc: Render Helm templates locally (dry-run)
    cmds:
      - helm template cadre ./helm/cadre

  helm:lint:
    desc: Lint the Helm chart
    cmds:
      - helm lint ./helm/cadre

  helm:install:
    desc: Install/upgrade Cadre on the current k8s cluster
    cmds:
      - helm upgrade --install cadre ./helm/cadre -f ./helm/cadre/values.yaml

  # ── Secrets / Helpers ──────────────────────────────────────
  gen:secret:
    desc: Generate a random base64 secret (for AUTH_SECRET, ENCRYPTION_SECRET)
    cmds:
      - openssl rand -base64 32

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - rm -rf .next
      - rm -rf node_modules/.cache

  nuke:
    desc: Full clean — removes node_modules, .next, and caches
    prompt: This will delete node_modules. Continue?
    cmds:
      - rm -rf .next node_modules/.cache node_modules

  # ── Composite ──────────────────────────────────────────────
  ci:
    desc: Run the full CI pipeline locally (lint + test + build)
    cmds:
      - task: lint
      - task: test
      - task: build

  up:
    desc: Start everything for local dev (infra + dev server)
    cmds:
      - task: infra:up
      - sleep 2
      - task: dev

# Cadre Helm Chart — Dev Environment Overlay
# Single replica, no autoscaling, debug logging

replicaCount: 1

autoscaling:
  enabled: false

config:
  CADRE_ENV: "dev"
  # Debug logging for development visibility
  LOG_LEVEL: "debug"
  # REQUIRED: Update to your dev domain
  NEXTAUTH_URL: "https://dev.cadre.example.com"
  WEBHOOK_BASE_URL: "https://dev.cadre.example.com/api/webhooks"

ingress:
  hosts:
    - host: dev.cadre.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

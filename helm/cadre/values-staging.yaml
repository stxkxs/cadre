# Cadre Helm Chart — Staging Environment Overlay
# Mirrors prod topology at smaller scale for pre-release validation

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  CADRE_ENV: "staging"
  LOG_LEVEL: "info"
  # REQUIRED: Update to your staging domain
  NEXTAUTH_URL: "https://staging.cadre.example.com"
  WEBHOOK_BASE_URL: "https://staging.cadre.example.com/api/webhooks"

ingress:
  hosts:
    - host: staging.cadre.example.com
      paths:
        - path: /
          pathType: Prefix

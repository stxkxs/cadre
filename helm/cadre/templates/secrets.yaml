apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: cadre
    release: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.env.REDIS_URL | quote }}
  AUTH_SECRET: {{ .Values.env.AUTH_SECRET | quote }}
  AUTH_GITHUB_ID: {{ .Values.env.AUTH_GITHUB_ID | quote }}
  AUTH_GITHUB_SECRET: {{ .Values.env.AUTH_GITHUB_SECRET | quote }}
  ENCRYPTION_SECRET: {{ .Values.env.ENCRYPTION_SECRET | quote }}

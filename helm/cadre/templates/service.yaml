apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cadre
  labels:
    app: cadre
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    app: cadre
    release: {{ .Release.Name }}

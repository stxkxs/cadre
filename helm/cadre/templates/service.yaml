apiVersion: v1
kind: Service
metadata:
  name: {{ include "cadre.fullname" . }}
  labels:
    {{- include "cadre.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "cadre.selectorLabels" . | nindent 4 }}

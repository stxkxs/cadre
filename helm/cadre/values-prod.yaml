# Cadre Helm Chart — Production Environment Overlay
# High availability: 3+ replicas, HPA enabled, IRSA for Bedrock

replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  CADRE_ENV: "prod"
  LOG_LEVEL: "warn"
  # REQUIRED: Update to your production domain
  NEXTAUTH_URL: "https://cadre.example.com"
  WEBHOOK_BASE_URL: "https://cadre.example.com/api/webhooks"

ingress:
  hosts:
    - host: cadre.example.com
      paths:
        - path: /
          pathType: Prefix

serviceAccount:
  create: true
  annotations:
    # REQUIRED for Bedrock: IRSA role ARN with bedrock:InvokeModel + bedrock:ListFoundationModels
    # Create role: aws iam create-role --role-name cadre-bedrock-role ...
    # Then associate with EKS: eksctl create iamserviceaccount ...
    eks.amazonaws.com/role-arn: "" # Set to Bedrock IRSA role ARN
